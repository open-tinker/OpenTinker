# ALFWorld Training Configuration with WMC-ERC Dynamic Entropy Clipping
# Use with: python alfworld_rl.py --config-name alfworld_wmc_erc_param
#
# WMC-ERC (World Model-Conditioned Entropy Regularized Co-evolution):
# Uses the LLM's prediction entropy at env token positions as a World Model
# uncertainty signal (H_WM) to dynamically gate policy gradient updates.
# Prevents entropy collapse in well-understood regions while permitting
# exploration in uncertain ones.

# Project settings
project_name: opentinker
experiment_name: alfworld_wmc_erc_clip

# Logging
logger_backends: ["console", "wandb"]

# Tracing (optional)
enable_tracing: true
weave_project: null

# WandB (optional)
wandb_key: null

# Model and tokenizer
tokenizer_path: null
enable_sleep_mode: false

# Training parameters
batch_size: 8
num_workers: 4
num_epochs: null
num_steps: 1000
save_freq: 200
test_freq: 50

# Validation parameters
val_batch_size: 50

# Generation parameters
temperature: 1
top_p: 1
max_new_tokens: 4096
max_prompt_tokens: 2048

# Algorithm (must be agent_loop for multi-turn)
algorithm: "agent_loop"

# Use per-step advantage for multi-turn credit assignment
adv_estimator: "grpo"
rollout_n: 8

# WMC-ERC: Dynamic Entropy Clipping
# - mu_base: clipping coefficient for collapsing side (S_* > S_bar)
# - mu_exp: clipping coefficient for exploration side (S_* < S_bar, usually > mu_base)
# - eta_wm: base multiplier for WM uncertainty signal
# - lambda_wm: exponential decay factor for WM uncertainty (higher H_WM -> smaller gate)
# - clipping_type: "batch" or "global" (global uses running statistics)
# - clipping_method: "mask" (0/1 gating) or "clip" (PPO-style soft clipping)
# - clip_positive_only: if true, only apply clipping to tokens with positive advantages
# - inverse_sft_mask: if true, use (1 - m_t) as weights for SFT loss on subsequent env tokens
# - momentum: momentum for running statistics (only used if clipping_type is "global")
# - enable: master switch
wmc_erc:
  enable: true
  mu_base: 1.0
  mu_exp: 3.0
  eta_wm: 2.0
  lambda_wm: 1.0
  clipping_type: "global"
  clipping_method: "clip"
  clip_positive_only: false
  inverse_sft_mask: false
  momentum: 0.9

# World Model SFT loss: predict environment observation tokens as auxiliary task
world_model_coeff: 0.0
world_model_annealing_steps: 0
world_model_annealing_end_factor: 1.0

# RWML: Reinforcement World Model Learning (arxiv:2602.05842)
# Computes per-turn rewards based on text embedding similarity between the
# model's predicted next observation (argmax at obs token positions) and the
# actual environment observation. Binary reward: 1.0 if (1-cos_sim) < tau_d.
# - enable: master switch
# - embedding_model: HuggingFace model for text embeddings
# - tau_d: distance threshold (paper uses 0.2 for ALFWorld)
# - coeff: weight when combining RWML reward with task success reward
rwml:
  enable: false
  embedding_model: "Alibaba-NLP/gte-large-en-v1.5"
  tau_d: 0.2
  coeff: 1.0

# Interaction configuration
interaction:
  name: alfworld
  class_path: opentinker.environment.gym_environment_interaction.GymEnvironmentInteraction
  config:
    env_host: 0.0.0.0
    env_port: 8092
    env_endpoint: http://${interaction.config.env_host}:${interaction.config.env_port}
    env_shards: 1
    max_steps: 20
    max_total_steps: 20
    observation_template: "{observation}"
    split: train

multi_turn:
  max_user_turns: ${interaction.config.max_total_steps}
  max_assistant_turns: ${interaction.config.max_total_steps}
  max_tokens_per_turn: 512
  weave_project: null
  experiment_name: "alfworld_wmc_erc"

# Scheduler settings
scheduler_url: "http://0.0.0.0:8780"
scheduler_api_key: null

# GPU settings
num_gpus: 4
